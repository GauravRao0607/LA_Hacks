<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CrisisLine AI — Dispatch Dashboard</title>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { display: flex; height: 100vh; font-family: 'Segoe UI', sans-serif; background: #0d0d1a; color: #e0e0f0; overflow: hidden; }

    #sidebar {
      width: 320px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: #12122a;
      border-right: 1px solid #2a2a4a;
    }

    #sidebar-header {
      padding: 16px;
      border-bottom: 1px solid #2a2a4a;
    }

    #sidebar-header h1 { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: 0.5px; }
    #sidebar-header p { font-size: 11px; color: #888; margin-top: 2px; }

    #controls {
      padding: 10px 16px;
      border-bottom: 1px solid #2a2a4a;
      display: flex;
      gap: 8px;
    }

    button {
      flex: 1;
      padding: 8px 10px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }

    #mock-btn { background: #2a2a6a; color: #a0a0ff; }
    #clear-btn { background: #3a1a1a; color: #ff8888; }

    #stats {
      padding: 8px 16px;
      display: flex;
      gap: 8px;
      border-bottom: 1px solid #2a2a4a;
    }

    .stat { flex: 1; text-align: center; padding: 6px 4px; border-radius: 6px; }
    .stat .count { font-size: 20px; font-weight: 700; }
    .stat .label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; opacity: 0.8; }
    .stat.critical { background: #2a0a0a; color: #ff5555; }
    .stat.urgent   { background: #2a1500; color: #ff9944; }
    .stat.standard { background: #0a2a0a; color: #44cc44; }

    #incident-list { flex: 1; overflow-y: auto; padding: 8px; }
    #incident-list::-webkit-scrollbar { width: 4px; }
    #incident-list::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 2px; }

    .incident-card {
      padding: 10px 12px;
      margin-bottom: 6px;
      border-radius: 8px;
      cursor: pointer;
      transition: filter 0.15s;
      border-left: 4px solid;
    }
    .incident-card:hover { filter: brightness(1.2); }

    .incident-card.Critical { background: #1e0808; border-color: #ff3b3b; }
    .incident-card.Urgent   { background: #1e1000; border-color: #ff8800; }
    .incident-card.Standard { background: #081e08; border-color: #33cc33; }

    .card-tier { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; display: flex; justify-content: space-between; }
    .card-type { font-size: 13px; font-weight: 600; margin-top: 4px; color: #fff; }
    .card-loc  { font-size: 11px; color: #aaa; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-meta { font-size: 10px; color: #777; margin-top: 3px; }

    .Critical .card-tier { color: #ff5555; }
    .Urgent   .card-tier { color: #ff9944; }
    .Standard .card-tier { color: #44cc44; }

    #map { flex: 1; }

    /* Mapbox popup overrides */
    .mapboxgl-popup-content {
      background: #1a1a2e;
      color: #e0e0f0;
      border-radius: 8px;
      padding: 12px 14px;
      min-width: 220px;
      font-size: 12px;
      line-height: 1.6;
      border: 1px solid #2a2a4a;
    }
    .mapboxgl-popup-tip { border-top-color: #1a1a2e !important; border-bottom-color: #1a1a2e !important; }
    .popup-title { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
    .popup-row { display: flex; gap: 6px; }
    .popup-label { color: #888; min-width: 60px; }
    .popup-score { font-weight: 700; font-size: 13px; margin: 6px 0; }
    .resolve-btn {
      width: 100%;
      margin-top: 8px;
      background: #3a1a1a;
      color: #ff8888;
      border: 1px solid #5a2a2a;
      border-radius: 5px;
      padding: 5px;
      font-size: 11px;
      cursor: pointer;
    }
    .resolve-btn:hover { background: #5a2a2a; }

    #status-bar {
      padding: 6px 16px;
      font-size: 10px;
      color: #555;
      border-top: 1px solid #2a2a4a;
    }
    #status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #44cc44; margin-right: 5px; vertical-align: middle; }
    #status-dot.error { background: #cc4444; }
  </style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>CrisisLine AI</h1>
    <p>Emergency Dispatch Dashboard — Los Angeles</p>
  </div>

  <div id="controls">
    <button id="mock-btn" onclick="addMock()">+ Mock Incident</button>
    <button id="clear-btn" onclick="clearAll()">Clear All</button>
  </div>

  <div id="stats">
    <div class="stat critical"><div class="count" id="cnt-critical">0</div><div class="label">Critical</div></div>
    <div class="stat urgent">  <div class="count" id="cnt-urgent">0</div>  <div class="label">Urgent</div></div>
    <div class="stat standard"><div class="count" id="cnt-standard">0</div><div class="label">Standard</div></div>
  </div>

  <div id="incident-list"><p style="color:#555;font-size:12px;padding:12px;">No active incidents.</p></div>

  <div id="status-bar"><span id="status-dot"></span><span id="status-text">Connecting...</span></div>
</div>

<div id="map"></div>

<script>
  // ── Config ──────────────────────────────────────────────────────────────────
  const MAPBOX_TOKEN = 'MAP_BOX_TOKEN_PLACEHOLDER'; // paste your pk.eyJ1... token here
  const API = 'http://localhost:8000';

  const TIER_COLORS = { Critical: '#ff3b3b', Urgent: '#ff8800', Standard: '#33cc33' };

  // ── Map init ────────────────────────────────────────────────────────────────
  mapboxgl.accessToken = MAPBOX_TOKEN;
  const map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/dark-v11',
    center: [-118.2437, 34.0522],
    zoom: 10,
  });
  map.addControl(new mapboxgl.NavigationControl(), 'bottom-right');

  // ── State ───────────────────────────────────────────────────────────────────
  const markerMap = {};         // id → { marker, popup }
  let currentIncidents = [];

  // ── Core update ─────────────────────────────────────────────────────────────
  function updateIncidents(incidents) {
    const newIds = new Set(incidents.map(i => i.id));

    // Remove resolved markers
    for (const id of Object.keys(markerMap)) {
      if (!newIds.has(id)) {
        markerMap[id].marker.remove();
        delete markerMap[id];
      }
    }

    // Add new markers
    for (const inc of incidents) {
      if (markerMap[inc.id]) continue;
      if (inc.lat == null || inc.lng == null) continue;

      const el = document.createElement('div');
      const color = TIER_COLORS[inc.tier] || '#aaa';
      el.style.cssText = `
        width: 16px; height: 16px; border-radius: 50%;
        background: ${color}; border: 2px solid rgba(255,255,255,0.7);
        box-shadow: 0 0 10px ${color}88; cursor: pointer;
        transition: transform 0.15s;
      `;
      el.addEventListener('mouseenter', () => el.style.transform = 'scale(1.4)');
      el.addEventListener('mouseleave', () => el.style.transform = 'scale(1)');

      const popup = new mapboxgl.Popup({ offset: 14, closeButton: true })
        .setHTML(buildPopupHTML(inc));

      const marker = new mapboxgl.Marker(el)
        .setLngLat([inc.lng, inc.lat])
        .setPopup(popup)
        .addTo(map);

      markerMap[inc.id] = { marker, popup };
    }

    updateSidebar(incidents);
    updateStats(incidents);
    currentIncidents = incidents;
  }

  function buildPopupHTML(inc) {
    const color = TIER_COLORS[inc.tier] || '#aaa';
    const time = inc.timestamp ? new Date(inc.timestamp).toLocaleTimeString() : '—';
    return `
      <div class="popup-title" style="color:${color}">${inc.emergency_type.toUpperCase()}</div>
      <div class="popup-row"><span class="popup-label">Caller:</span> ${inc.caller_name}</div>
      <div class="popup-row"><span class="popup-label">Location:</span> ${inc.location}</div>
      <div class="popup-row"><span class="popup-label">People:</span> ${inc.num_people}</div>
      <div class="popup-row"><span class="popup-label">Injuries:</span> ${inc.injuries || '—'}</div>
      <div class="popup-row"><span class="popup-label">Hazards:</span> ${inc.hazards || '—'}</div>
      <div class="popup-row"><span class="popup-label">Mobility:</span> ${inc.mobility || '—'}</div>
      <div class="popup-score" style="color:${color}">Score: ${inc.score} &nbsp;|&nbsp; ${inc.tier}</div>
      <div style="color:#666;font-size:10px">${time}</div>
      <button class="resolve-btn" onclick="resolveIncident('${inc.id}')">Resolve Incident</button>
    `;
  }

  function updateSidebar(incidents) {
    const list = document.getElementById('incident-list');
    if (incidents.length === 0) {
      list.innerHTML = '<p style="color:#555;font-size:12px;padding:12px;">No active incidents.</p>';
      return;
    }
    list.innerHTML = incidents.map(inc => {
      const color = TIER_COLORS[inc.tier] || '#aaa';
      const time = inc.timestamp ? new Date(inc.timestamp).toLocaleTimeString() : '';
      return `
        <div class="incident-card ${inc.tier}" onclick="flyTo('${inc.id}')">
          <div class="card-tier">
            <span>${inc.tier}</span>
            <span>${inc.score}</span>
          </div>
          <div class="card-type">${inc.emergency_type}</div>
          <div class="card-loc">${inc.location}</div>
          <div class="card-meta">${inc.num_people} people &nbsp;·&nbsp; ${time}</div>
        </div>
      `;
    }).join('');
  }

  function updateStats(incidents) {
    document.getElementById('cnt-critical').textContent = incidents.filter(i => i.tier === 'Critical').length;
    document.getElementById('cnt-urgent').textContent   = incidents.filter(i => i.tier === 'Urgent').length;
    document.getElementById('cnt-standard').textContent = incidents.filter(i => i.tier === 'Standard').length;
  }

  // ── Actions ─────────────────────────────────────────────────────────────────
  function flyTo(id) {
    const inc = currentIncidents.find(i => i.id === id);
    if (!inc || inc.lat == null) return;
    map.flyTo({ center: [inc.lng, inc.lat], zoom: 14, duration: 800 });
    markerMap[id]?.marker.togglePopup();
  }

  async function resolveIncident(id) {
    await fetch(`${API}/incidents/${id}`, { method: 'DELETE' });
    // SSE will push updated list within 2s automatically
  }

  async function addMock() {
    const btn = document.getElementById('mock-btn');
    btn.disabled = true;
    await fetch(`${API}/incidents/mock`, { method: 'POST' });
    setTimeout(() => btn.disabled = false, 1000);
  }

  async function clearAll() {
    for (const inc of currentIncidents) {
      await fetch(`${API}/incidents/${inc.id}`, { method: 'DELETE' });
    }
  }

  // ── SSE connection ───────────────────────────────────────────────────────────
  function setStatus(ok, text) {
    const dot = document.getElementById('status-dot');
    dot.className = ok ? '' : 'error';
    document.getElementById('status-text').textContent = text;
  }

  map.on('load', () => {
    const source = new EventSource(`${API}/incidents/stream`);

    source.onopen = () => setStatus(true, 'Live — streaming updates');

    source.onmessage = (e) => {
      try { updateIncidents(JSON.parse(e.data)); }
      catch (err) { console.error('SSE parse error', err); }
    };

    source.onerror = () => {
      source.close();
      setStatus(false, 'SSE failed — polling every 3s');

      // Fallback: poll /incidents every 3 seconds
      setInterval(async () => {
        try {
          const res = await fetch(`${API}/incidents`);
          updateIncidents(await res.json());
          setStatus(true, 'Polling every 3s');
        } catch (err) {
          setStatus(false, 'Cannot reach backend');
        }
      }, 3000);
    };
  });
</script>
</body>
</html>
